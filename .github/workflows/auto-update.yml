name: Update GitHub Stats

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create profile folder
        run: mkdir -p profile

      - name: Generate GitHub stats
        run: |
          curl -o profile/stats.svg "https://github-readme-stats-sigma-five.vercel.app/api?username=pgiahuy&show_icons=true&theme=tokyonight&hide_border=true"

      - name: Generate top languages
        run: |
          curl -o profile/top-langs.svg "https://github-readme-stats-sigma-five.vercel.app/api/top-langs/?username=pgiahuy&layout=compact&theme=tokyonight&hide_border=true&hide=css,html"

      - name: Generate streak stats
        run: |
          curl -o profile/streak.svg "https://streak-stats.demolab.com?user=pgiahuy&theme=tokyonight&hide_border=true"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: update github stats" || exit 0
          git push
